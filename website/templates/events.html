<head>
  {% extends "base.html" %}
  {% block title %}Home{% endblock %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">

</head>

<body>
  {% block content %}

  </style>

      <div class="footer-bar">
        <div class="footer-left" style="align-self: flex-end;">
        </div>

        <div class="footer-right-centered">
          <h3 style="font-size: 1.5rem; font-weight: 600;">Interested in a partnership?</h3>
          <p style="font-size: 1.1rem;">Contact us at:</p>
          <p style="font-size: 1.1rem;">rohini@pulseforjustice.org</p>
          <p style="font-size: 1.1rem;">
            <a href="https://www.instagram.com/pulseforjustice_official/" target="_blank" style="color: white; text-decoration: none;">
              <i class="fa fa-instagram" style="font-size: 1.3rem; position: relative; top: 2px; left: 4px;"></i> @pulseforjustice
          <p style="font-size: 1.1rem;"><br>A 501(c)(3) organization fiscally sponsored by the Hack Foundation</p>
            </a>
          </p>
        </div>
      </div>
    </div>
  
</style>

<style>
    /* ===== Footer Bar ===== */
  .footer-bar {
    margin-top: 500px;
    height: auto !important;
    background-color: #bb1e29;
    color: white;
    padding: 3rem 5vw 2rem 5vw;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    min-height: 250px;
    position: relative;
  }

  .footer-left button {
    background-color: #e0e0e0;
    color: black;
    border: none;
    padding: 0.9rem 1.4rem;
    font-weight: 700;
    font-size: 1rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-bottom: 0.5rem;
    margin-left: 1vw;
  }

  .footer-left button:hover {
    background-color: #d5d5d5;
  }

  .footer-right-centered {
    flex-grow: 1;
    margin-left: 5vw; /* slight left shift for centering */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .footer-right-centered h3 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.8rem;
  }

  .footer-right-centered p {
    font-size: 1rem;
    margin: 0.3rem 0;
  }

  .footer-right-centered i {
    margin-right: 6px;
  }
</style>

  {% endblock %}
</body>
</html>
